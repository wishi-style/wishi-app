name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wishi
          POSTGRES_PASSWORD: password
          POSTGRES_DB: wishi_p5
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U wishi"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://wishi:password@localhost:5432/wishi_p5?sslmode=disable
      DIRECT_DATABASE_URL: postgresql://wishi:password@localhost:5432/wishi_p5?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npm run build

      - name: Apply migrations to test DB
        run: |
          npx prisma migrate deploy
          psql "$DATABASE_URL" -f prisma/migrations/phase4_constraints.sql

      - name: Seed test DB (plans + quizzes)
        run: npx tsx prisma/seed.ts

      - name: Run tests
        run: npm run test
