name: Terraform

# Plan-only on PRs that touch infra/ — gives a preview of changes in the PR
# discussion. Auto-apply on merge was removed because the GitHub Actions
# IAM role is intentionally narrowly scoped (least-privilege for app
# deploys: ECR/ECS/Secrets-Read/S3-Assets) and granting it the
# read-everything + write-many perms that `terraform apply` requires would
# defeat the point.
#
# Terraform changes are applied manually with admin creds:
#   cd infra && terraform init -backend-config=staging.tfbackend
#   terraform apply -var-file=staging.tfvars
#
# Same for production (use production.tfbackend / production.tfvars).
on:
  pull_request:
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Plan only (apply still runs locally)"
        required: true
        type: choice
        options:
          - plan-staging
          - plan-production

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.14"

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ (github.event.inputs.action == 'plan-production') && vars.AWS_PRODUCTION_ROLE_ARN || vars.AWS_STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend-config=${{ (github.event.inputs.action == 'plan-production') && 'production' || 'staging' }}.tfbackend

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -var-file=${{ (github.event.inputs.action == 'plan-production') && 'production' || 'staging' }}.tfvars -no-color
        continue-on-error: true
