name: Visual regression

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "tailwind.config.*"
      - "postcss.config.*"
      - "next.config.*"
      - "playwright.visual.config.ts"
      - "tests/visual/**"
      - "package.json"
      - "package-lock.json"

jobs:
  visual:
    runs-on: ubuntu-latest

    # Full runner for a dev-server + Chromium — needs headroom
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wishi
          POSTGRES_PASSWORD: password
          POSTGRES_DB: wishi_p5
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U wishi"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://wishi:password@localhost:5432/wishi_p5?sslmode=disable
      DIRECT_DATABASE_URL: postgresql://wishi:password@localhost:5432/wishi_p5?sslmode=disable
      VISUAL_PORT: 3100

    steps:
      - uses: actions/checkout@v4
        with:
          # LFS/snapshot-file comparisons need the actual bytes, not a pointer
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Apply migrations + phase4 constraints
        run: |
          npx prisma migrate deploy
          psql "$DATABASE_URL" -f prisma/migrations/phase4_constraints.sql

      - name: Seed DB (plans + quizzes — required by marketing pages)
        run: npx tsx prisma/seed.ts

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run visual regression
        run: npm run test:visual

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: |
            test-results/
            playwright-report/
          retention-days: 14

      - name: Comment on PR with artifact link on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "Visual regression failed.",
                "",
                `Diffs are attached to the run: ${run}`,
                "",
                "If the change was intentional, update baselines locally with",
                "`npm run test:visual:update`, commit the new snapshots, and push.",
              ].join("\n"),
            });
